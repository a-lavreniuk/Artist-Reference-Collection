appId: com.arc.artist-reference-collection
productName: ARC
copyright: Copyright © ARC
protocols:
  - name: ARC
    schemes:
      - arc
directories:
  output: dist-electron
  buildResources: build
files:
  - main/**/*
  - preload/**/*
  - renderer/dist/**/*
  - package.json
  - node_modules/**/*
  - "!**/*.gguf"
  - "!**/models/transformers/**"
  - "!**/models/llama/**"
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"
  - "**/node_modules/ffprobe-static/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
extraResources:
  - from: release-notes.json
    to: release-notes.json
  - from: build/icons/icon.png
    to: icons/icon.png
  - from: build/icons/icon-16.png
    to: icons/icon-16.png
  - from: build/icons/icon.ico
    to: icons/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icons/icon-512.png
  category: public.app-category.graphics-design
  hardenedRuntime: false
  gatekeeperAssess: false
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  runAfterFinish: true
  differentialPackage: true
  deleteAppDataOnUninstall: true
  include: uninstaller.nsh
# Primary feed is the first provider (written into app-update.yml).
# GitLab is a release-artifacts mirror; client falls back via setFeedURL in updater.ts.
publish:
  - provider: github
    owner: a-lavreniuk
    repo: Artist-Reference-Collection
    releaseType: release
  - provider: gitlab
    projectId: 84578247
    host: gitlab.com
    vPrefixedTagName: false
    # /uploads rejects large NSIS installers (413); packages support big binaries.
    uploadTarget: generic_package
